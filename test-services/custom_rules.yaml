rules:
  request.query.sql_injection:
    enabled: true
    applies_to:
      - request
    type: query
    description: Detects SQL injection-like patterns in query parameter values.
    match:
      paths:
        - "*"
      methods:
        - GET
      patterns:
        - target: query
          name: "*"
          pattern: "(?i)(union\\s+select|or\\s+1=1|drop\\s+table)"
    finding:
      title: Possible SQL injection attempt
      message: Request query parameter matched a suspicious SQL injection pattern.

  request.query.debug_enabled:
    enabled: true
    applies_to:
      - request
    type: query
    description: Detects requests that enable debug mode through query parameters.
    match:
      paths:
        - "*"
      methods:
        - GET
      query_params:
        debug:
          - "true"
    finding:
      title: Debug query parameter enabled
      message: Request included debug=true in the query string.

  request.query.risky_mode:
    enabled: true
    applies_to:
      - request
    type: query
    description: Detects risky mode values in query parameters.
    match:
      paths:
        - "*"
      methods:
        - GET
      query_params:
        mode:
          - debug
          - admin
          - test
    finding:
      title: Risky mode query parameter
      message: Request included a risky mode query parameter value.

  request.header.debug_header:
    enabled: true
    applies_to:
      - request
    type: header
    description: Detects requests that include debug-related request headers.
    match:
      paths:
        - "*"
      methods:
        - GET
      headers:
        X-Debug:
          - "true"
    finding:
      title: Debug header enabled
      message: Request included X-Debug=true.

  request.path.sensitive_route_access:
    enabled: true
    applies_to:
      - request
    type: path
    description: Detects requests to sensitive or internal-looking paths.
    match:
      paths:
        - "*"
      methods:
        - GET
      patterns:
        - target: path
          pattern: "(?i)^/(health|admin|internal|debug|actuator|metrics|server-status)(/.*)?$"
    finding:
      title: Sensitive path requested
      message: Request path matched a sensitive or internal route pattern.
